<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOTx Panel - Giris</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(88, 101, 242, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(237, 66, 69, 0.1) 0%, transparent 50%);
        }
        .login-card {
            background: #13131a;
            border: 1px solid #1f1f2a;
            border-radius: 24px;
            padding: 48px 40px;
            width: 420px;
            max-width: 90vw;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #5865F2, #ED4245);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo p {
            color: #80808a;
            font-size: 14px;
            margin-top: 4px;
        }
        form { display: flex; flex-direction: column; gap: 16px; }
        label {
            color: #a0a0aa;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input[type="password"] {
            background: #1a1a24;
            border: 1px solid #2a2a3a;
            border-radius: 12px;
            padding: 14px 16px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="password"]:focus { border-color: #5865F2; }
        button {
            background: linear-gradient(135deg, #5865F2, #4752c4);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(88, 101, 242, 0.3); }
        .hata {
            background: rgba(237, 66, 69, 0.1);
            border: 1px solid rgba(237, 66, 69, 0.3);
            color: #ED4245;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h1>ROOTx</h1>
            <p>Admin Paneli</p>
        </div>
        <form method="POST">
            {% if hata %}<div class="hata">{{ hata }}</div>{% endif %}
            <label>Yonetici Sifresi</label>
            <input type="password" name="password" placeholder="Sifrenizi girin..." required>
            <button type="submit">Giris Yap</button>
        </form>
    </div>
</body>
</html>
